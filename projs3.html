<!DOCTYPE html>
<html>
<head>
    <title>Bulb Glow Effect</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111;
     
        }

        img{
            width:220px;
            cursor:pointer;
            transition:0.2s;
            border-radius: 5px;
        }
        .glow{
            filter:drop-shadow(0 0 25px yellow);
        }
        
    </style>
</head>

<body>
<center>
    <img src="BULB-OFF.jpeg" id="bulb" class="glow">
</center>

<script>

var bulb = document.getElementById("bulb");

bulb.onmouseover = function()
{
    bulb.src = "BULB-OFF.jpeg";
    bulb.classList.remove("glow");
}

bulb.onmouseout = function()
{
    bulb.src = "BULB-ON.jpeg";
    bulb.classList.add("glow");
}

</script>

</body>
</html>
