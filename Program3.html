<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:pink;
}

.topbar{
    width:1000px;
    height:80px;
    border:10px solid white;
    margin:200px auto 0;
    color:white;
    text-align:center;
    line-height:30px;
}

.header{
    width:1000px;
    height:200px;
    border:10px solid white;
    margin:auto;
    position:relative;
}

.blogname{
    width:300px;
    height:60px;
    border:5px solid white;
    color:white;
    text-align:center;
    line-height:60px;
    margin:25px auto;
    margin-top: 60px;
    font-size:25px;
    font-weight:bold;
}

.navbar{
    width:1000px;
    height:50px;
    border:10px solid white;
    margin:auto;
}


.nav-bar {
         color: aliceblue;
        font-size: 22px;
        display: inline-block;
        text-decoration: none;
        line-height: 2;
        margin-left: 50px;
       }
      

.main{
    width:1000px;
    margin:auto;
    display:flex;
}

.content{
    width:750px;
    height:500px;
    border:10px solid white;
    color:white;
    padding:15px;
}

.image{
    width:90%;
    height:250px;
    border:5px solid white;
    margin:20px auto;
    background-color:#FADADD;
}

.line{
    width:90%;
    height:10px;
    background:white;
    margin:15px auto;
}

.sidebar{
    width:250px;
    height:500px;
    border:10px solid white;
    color:white;
    padding:10px;
    border-left: none;
}

.box{
    width:100%;
    height:80px;
    border:5px solid white;
    margin-top:15px;
    background-color:#FADADD;
}

.footer{
    width:1000px;
    height:150px;
    border:10px solid white;
    margin:auto;
    color:white;
    text-align:center;
    line-height:80px;
}

.bottom-strip{
    width:100%;
    height:300px;
    background:rgb(22, 102, 102);
    color:white;
    text-align:center;
    margin-top:-20px;
    padding-top:20px;
}
.sub-content{
    font-weight: bold;
}
        .left,.center,.right{
           width: 33.33%;
            float: left;
            text-align: center;
            line-height: 30px;
           
            color:white;
        }
      
        .clear-all{
            clear: both;
          
            line-height: 0;
        }
        .circle{
            width: 100px;
        height: 100px;
        background-color: yellow;
          position: relative;
        border-radius: 360px;
        color: white;
        font-weight: bold;
        text-align: center;
        align-items: center;
        margin: -50px auto 0;
        z-index: 10;
        font-size: 35px;
    }
        .design-box{
            width: 600px;
        height: 80px;
        border: 5px white;
        background-color: white;
        border-color: white;
          position: relative;
    
        color: black;
        font-weight: bold;
        text-align: center;
       
        margin: -50px auto 0;
        z-index: 10;
        font-size: 15px;
        }
.logo{
    float: right;
}
</style>
</head>

<body>

<div class="topbar">
    INFORMATION MENU BAR
</div>

<div class="header">
    <div class="blogname">
        BLOG NAME
    </div>

</div>


<div class="navbar">
    <p class="left">CATEGORY1</p>
    <p class="center">CATEGORY2</p>
    <p class="right"> CATEGORY3</p>
    <br class="clear-all"/>
    
</div>

<div class="main">

    <div class="content">
        CATEGORY
        <div class="sub-content"></div>
        <H2>POST TITLE</H2>
        DATE

        <div class="image"></div>

        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div><br>
        COMMENTS
               <Div class="logo"> <i class="fa-brands fa-facebook-f"></i>
<i class="fa-brands fa-twitter"></i>
<i class="fa-brands fa-pinterest-p"></i>
<i class="fa-brands fa-square-instagram"></i>
</Div>

    </div>

    <div class="sidebar">

        <h4>FOLLOW US</h4><br>
        <i class="fa-brands fa-facebook-f"></i>
<i class="fa-brands fa-twitter"></i>
<i class="fa-brands fa-pinterest-p"></i>
<i class="fa-brands fa-square-instagram"></i>


        <div class="box"></div>

        <h4 style="margin-top:15px;">POPULAR POST</h4>

        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>

    </div>

</div>

<div class="footer">
    CREDIT & COPYRIGHT
</div>
<div class="design-box"><H1>BLOG DESIGN 101</H1></div>
<div class="circle"><h2>01</h2></div>
<div class="bottom-strip">
    
    <h1>ANATOMY OF A BLOG LAYOUT</h1><br>
    <h4>DESIGNISTAY.COM</h4>
</div>

</body>
</html>
