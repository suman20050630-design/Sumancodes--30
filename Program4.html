<!DOCTYPE html>
<html>
<head>
<title>Flat Signup Form</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
   
            background: #0B1F33;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
   
}

.heading{
    text-align:center;
    color:white;
    margin-top:80px;
    font-size:40px;
}

.form-box{
    width:400px;
    background:#07111d;
    margin:40px auto;
     color: white;
    padding:30px;
    text-align:center;
}

.input-box{
    width:100%;
    height:45px;
    margin-bottom:20px;
    background:transparent;
    border:1px solid gray;
    color:white;
    text-align:center;
    font-weight: bold;
}

.text{
    color:white;
    font-size:12px;
    margin-bottom:20px;
}

.btn{
    width:100%;
    height:45px;
    background:#24364a;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.social{
    margin-top:25px;
    color:white;
}

.icon{
    width:35px;
    height:35px;
    border-radius:50%;
    display:inline-block;
    line-height:35px;
    text-align:center;
    color:white;
    margin:5px;
}

.fb{
    background:#1877f2;
    color: white;
  
     border-radius:50%;
}

.tw{
    background:#1da1f2;
     border-radius:50%;
}

.gp{
    background:#db4437;
     border-radius:50%;
}

.footer{
    text-align:center;
    color:white;
    margin-top:100px;
    font-size:12px;
}
input::placeholder{
    color: white;
}
</style>

</head>
<body>

<h1 class="heading">Flat Signup Form</h1>

<div class="form-box">

    <input type="text" placeholder="Realname" class="input-box">

    <input type="text" placeholder="Username" class="input-box">

    <input type="password" placeholder="Password" class="input-box">

    <input type="password" placeholder="Confirm Password" class="input-box">

    <p class="text">
        By clicking signup, I agree to your terms
    </p>

    <button class="btn">SIGN UP</button>

    <div class="social">
        Follow us on :
        <i class="fa-brands fa-facebook fb"></i>
        <i class="fa-brands fa-square-twitter tw"></i>
        <i class="fa-brands fa-google-plus gp"></i>
    </div>

</div>

<div class="footer">
   <h3> © 2016 Flat Signup Form. All rights reserved I Design by W3layout</h3>
</div>

</body>
</html>
