<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
}

.logo{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:42px;
    font-weight:300;
    color:#555;
}

p{
    margin-top:10px;
    color:#666;
}

.login-box{
    width:380px;
    margin:30px auto;
    padding:30px;
    border:1px solid #ddd;
    background:#fff;
    box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.profile{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#e0e0e0;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:#999;
}

input{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:1px solid #4285f4;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    background:#4285f4;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#357ae8;
}

.login-box a{
    display:block;
    text-align:right;
    margin-top:15px;
    text-decoration:none;
    color:#4285f4;
}

.create{
    text-decoration:none;
    color:#4285f4;
    display:block;
    margin-bottom:25px;
}

.bottom-text{
    color:#666;
}

.icons{
    margin-top:15px;
    font-size:28px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.icons i{
    color:#4285f4;
}
</style>
</head>
<body>

    <div class="container">

        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
        alt="Google Logo" class="logo">

        <h1>One account. All of Google.</h1>
        <p>Sign in to continue to Gmail</p>

        <div class="login-box">

            <div class="profile">
                <i class="fa-solid fa-user"></i>
            </div>

            <input type="email" placeholder="Enter your email">

            <button>Next</button>

            <a href="#">Need help?</a>

        </div>

        <a href="#" class="create">Create account</a>

        <p class="bottom-text">
            One Google Account for everything Google
        </p>

        <div class="icons">
            <i class="fa-brands fa-google"></i>
            <i class="fa-solid fa-envelope"></i>
            <i class="fa-brands fa-youtube"></i>
            <i class="fa-brands fa-google-drive"></i>
            <i class="fa-brands fa-chrome"></i>
        </div>

    </div>

</body>
</html>
