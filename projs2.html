<!DOCTYPE html>
<html>
<head>
    <title>Validation</title>
</head>
<body>

<h2> Contact Number</h2>
<input type="text" id="txt1" placeholder="Enter Mobile Number"><br>


<h2>Email ID</h2>
<input type="text" id="email" placeholder="Enter Email"><br>
<input type="button" value="Click Here" onclick="valid()">

<script>
function valid()
{
    
    var number = document.getElementById("txt1").value;
    var email = document.getElementById("email").value;
    var mobile = /^([6789][0-9]{9}|([6789][0-9])([0-9]{2}){4})$/;
    var mail = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;

    if(number=="") {
        alert("Please Enter Contact Number");
        return;
    }

    if(isNaN(number)) {
        alert("Only Numbers Allowed");
        return;
    }

    if(number.length!=10) {
        alert("Mobile Number Must Be 10 Digits");
        return;
    }

    if(!mobile.test(number)){
        alert("No. Must Start With 6,7,8 or 9");
        return;
    }
     alert("Contact Number Valid ✅");
   
    if(email==""){
        alert("Please Enter Email");
        return;
    }
    if(mail.test(email))
    {
        alert("Email Valid ✅");
    }
    else
    {
        alert("Invalid Email Format ❌");
    }
}

</script>

</body>
</html>
